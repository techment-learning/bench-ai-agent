name: Sync Bench Data from SharePoint

on:
  schedule:
    # Runs every hour — change to your preferred schedule
    # Format: minute hour day month weekday
    - cron: '0 * * * *'      # Every hour
    # - cron: '0 9 * * 1-5'  # Every weekday at 9 AM UTC (2:30 PM IST)
    # - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:           # Also allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit files back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Excel from SharePoint
        run: |
          echo "Downloading bench tracker from SharePoint..."
          curl -L \
            -o "data/bench_resource_tracker_v3.xlsx" \
            --retry 3 \
            --retry-delay 5 \
            --max-time 60 \
            "https://techment0-my.sharepoint.com/:x:/g/personal/sreejit_panicker_techment_com/IQBB9kzkWkiLRaha4FmmyqniAVwqY7uW93htPcw9Re8HOD8?e=Z20BvE&download=1"
          echo "Download complete. File size: $(du -sh data/bench_resource_tracker_v3.xlsx | cut -f1)"

      - name: Verify file is valid Excel
        run: |
          # Check file is not empty and looks like an Excel file
          FILE="data/bench_resource_tracker_v3.xlsx"
          SIZE=$(stat -c%s "$FILE")
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: Downloaded file is too small ($SIZE bytes) — SharePoint may have returned an error page"
            cat "$FILE"
            exit 1
          fi
          echo "File valid: $SIZE bytes"

      - name: Commit and push if file changed
        run: |
          git config user.name  "Bench Agent Bot"
          git config user.email "bench-agent@techment.com"
          git add data/bench_resource_tracker_v3.xlsx
          # Only commit if file actually changed
          if git diff --staged --quiet; then
            echo "No changes detected — Excel file unchanged since last sync"
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M UTC')
            git commit -m "Auto-sync bench data — $TIMESTAMP"
            git push
            echo "Pushed updated bench data to GitHub"
          fi
